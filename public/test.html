<!DOCTYPE html>
<html>
<head>
<style>
  body { background-color: red; padding: 50px; }
  img { max-width: 300px; }
</style>
</head>
<body>
  <h1>Transparency Test</h1>
  <img src="/assets/char-box.png" alt="char-box" />
  <script>
    const img = document.querySelector('img');
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      const data = ctx.getImageData(0, 0, 10, 10).data;
      console.log('Top left pixel:', data[0], data[1], data[2], data[3]);
      document.body.innerHTML += `<p>Top left alpha: ${data[3]}</p>`;
    };
  </script>
</body>
</html>
